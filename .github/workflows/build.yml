name: Build
on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  TAURI_CLI_VERSION: "^2"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            pkg-suffix: linux-amd64
            rust-target: x86_64-unknown-linux-gnu

          - os: macos-14
            target: aarch64-apple-darwin
            pkg-suffix: mac-arm64
            rust-target: aarch64-apple-darwin

          - os: macos-13
            target: x86_64-apple-darwin
            pkg-suffix: mac-amd64
            rust-target: x86_64-apple-darwin

          - os: windows-2025
            target: x86_64-pc-windows-msvc
            pkg-suffix: win-amd64
            rust-target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libwebkit2gtk-4.1-dev \
            build-essential \
            file \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "${{ env.TAURI_CLI_VERSION }}"

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install npm deps
        run: npm ci

      - name: Build sidecar
        shell: bash
        run: python build_sidecar.py

      - name: Build Tauri app (Linux)
        if: runner.os == 'Linux'
        run: cargo tauri build --bundles deb

      - name: Build Tauri app (macOS)
        if: runner.os == 'macOS'
        run: cargo tauri build --bundles dmg
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY || '' }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE || '' }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID || '' }}
          APPLE_ID: ${{ secrets.APPLE_ID || '' }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD || '' }}

      - name: Build Tauri app (Windows)
        if: runner.os == 'Windows'
        run: cargo tauri build --bundles nsis

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDFoo-${{ matrix.pkg-suffix }}
          path: src-tauri/target/release/bundle/
          compression-level: 0
